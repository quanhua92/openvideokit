<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Capability Reel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=block" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; background: #080808; overflow: hidden; font-family: 'Inter', sans-serif; }
    #stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }

    .title-screen {
      position: absolute; inset: 0; z-index: 500;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
    }
    .title-text {
      font-size: 88px; font-weight: 900; color: #fff;
      letter-spacing: -0.03em; text-align: center;
    }

    .progress-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: rgba(255,255,255,0.05); z-index: 9999;
    }
    .progress-fill { height: 100%; width: 0%; background: #ff5a3c; }
  </style>
</head>
<body>
  <div id="stage"
       data-composition-id="capability-reel"
       data-start="0"
       data-width="1920"
       data-height="1080"
       data-duration="15">

    <!-- SLIDES_HERE -->
    <!-- End slides -->

    <div class="title-screen" id="title-screen">
      <div class="title-text">Look what we built</div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

    <audio id="music-bed" src="assets/music-bed.mp3"
      data-start="0" data-duration="15" data-volume="0.2"
      data-track-index="0" loop preload="auto"></audio>

    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        var DUR = 15.0;

        // SCENE_TRANSITIONS
        // End scene transitions

        // Title overlay: fade in, hold, fade out (first 3s)
        tl.to('#title-screen', { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0);
        tl.to('#title-screen', { opacity: 0, scale: 1.05, duration: 0.4, ease: 'power2.in' }, 2.6);

        tl.fromTo('#progress-fill',
          { width: '0%' },
          { width: '100%', duration: DUR, ease: 'none' },
          0
        );

        tl.to({}, { duration: DUR }, 0);
        window.__timelines['capability-reel'] = tl;
      })();
    </script>
  </div>
</body>
</html>
