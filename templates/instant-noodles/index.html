<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Instant Noodles Recipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=block" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; background: #1a120a; overflow: hidden; font-family: 'Inter', sans-serif; }
    #stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }

    .progress-track {
      position: absolute; bottom: 60px; left: 100px; right: 100px;
      height: 6px; background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden; z-index: 9999;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ff6b35, #ffa050);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="stage"
       data-composition-id="instant-noodles"
       data-start="0"
       data-width="1920"
       data-height="1080"
       data-duration="18">

    <!-- SLIDES_HERE -->
    <!-- End slides -->

    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

    <audio id="music-bed" src="assets/music-bed.mp3"
      data-start="0" data-duration="18" data-volume="0.5"
      data-track-index="0" loop preload="auto"></audio>

    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        var DUR = 18.0;

        // SCENE_TRANSITIONS
        // End scene transitions

        tl.fromTo('#progress-fill',
          { width: '0%' },
          { width: '100%', duration: DUR, ease: 'none' },
          0
        );

        tl.to({}, { duration: DUR }, 0);
        window.__timelines['instant-noodles'] = tl;
      })();
    </script>
  </div>
</body>
</html>
