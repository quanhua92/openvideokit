<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Instant Noodles Recipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=block" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 1920px; height: 1080px;
      background: #1a120a; overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
    }
    #noodles {
      position: relative; width: 1920px; height: 1080px; overflow: hidden;
      background: radial-gradient(ellipse at 30% 40%, #2a1a0e 0%, #1a120a 60%, #0e0806 100%);
    }

    /* ── Left column: product image + brand ── */
    .left-col {
      position: absolute; top: 120px; left: 100px;
      width: 560px;
      display: flex; flex-direction: column; gap: 32px;
    }
    .product-frame {
      width: 560px; height: 560px;
      border-radius: 32px; overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,140,60,0.1);
      will-change: transform;
    }
    .product-frame img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .brand-block { padding-left: 8px; }
    .brand-name {
      font-size: 52px; font-weight: 900; color: #f5e6d3;
      line-height: 1.1; letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 28px; font-weight: 500; color: #ff8c3c;
      margin-top: 8px;
    }

    /* ── Right column: steps ── */
    .steps-area {
      position: absolute; top: 120px; right: 100px;
      width: 1060px; height: 840px;
    }
    .step {
      position: absolute; inset: 0;
      display: flex; align-items: center; gap: 48px;
      opacity: 0; will-change: transform, opacity;
    }
    .step-num {
      font-size: 240px; font-weight: 900; color: #ff6b35;
      line-height: 0.85; letter-spacing: -0.05em;
      opacity: 0.85; flex-shrink: 0;
      text-shadow: 0 0 60px rgba(255,107,53,0.2);
    }
    .step-body { flex: 1; }
    .step-text {
      font-size: 72px; font-weight: 700; color: #f5e6d3;
      line-height: 1.25; letter-spacing: -0.01em;
    }
    .step-time {
      font-size: 32px; font-weight: 600; color: #ff8c3c;
      margin-top: 16px; opacity: 0.8;
    }

    /* ── Progress bar ── */
    .progress-track {
      position: absolute; bottom: 60px; left: 100px; right: 100px;
      height: 6px; background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #ff6b35, #ffa050);
      border-radius: 3px;
    }

    /* ── Decorative glow ── */
    .glow {
      position: absolute; bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="noodles"
       data-composition-id="instant-noodles"
       data-start="0"
       data-width="1920"
       data-height="1080"
       data-duration="18">

    <div class="glow"></div>

    <!-- Left column: product + brand (Jinja2 slots injected here) -->
    <div class="left-col">
      <div class="product-frame" id="product-frame">
        <img src="{{ product_image_src }}" alt="Product" id="product-img" />
      </div>
      <div class="brand-block">
        <div class="brand-name">{{ brand_name }}</div>
        <div class="tagline">{{ tagline }}</div>
      </div>
    </div>

    <!-- Right column: animated steps -->
    <div class="steps-area">

      <div class="step" id="step-1">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-text">{{ step1_text }}</div>
          <div class="step-time">{{ step1_sub }}</div>
        </div>
      </div>

      <div class="step" id="step-2">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-text">{{ step2_text }}</div>
          <div class="step-time">{{ step2_sub }}</div>
        </div>
      </div>

      <div class="step" id="step-3">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-text">{{ step3_text }}</div>
          <div class="step-time">{{ step3_sub }}</div>
        </div>
      </div>

      <div class="step" id="step-4">
        <div class="step-num">4</div>
        <div class="step-body">
          <div class="step-text">{{ step4_text }}</div>
          <div class="step-time">{{ step4_sub }}</div>
        </div>
      </div>

      <div class="step" id="step-5">
        <div class="step-num">5</div>
        <div class="step-body">
          <div class="step-text">{{ step5_text }}</div>
          <div class="step-time">{{ step5_sub }}</div>
        </div>
      </div>

      <div class="step" id="step-6">
        <div class="step-num">6</div>
        <div class="step-body">
          <div class="step-text">{{ step6_text }}</div>
          <div class="step-time">{{ step6_sub }}</div>
        </div>
      </div>

    </div>

    <!-- Progress bar -->
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Background music -->
    <audio
      id="music-bed"
      src="assets/music-bed.mp3"
      data-start="0"
      data-duration="18"
      data-volume="0.5"
      data-track-index="0"
      loop
      preload="auto"></audio>

    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        var DUR = 18.0;
        var STEP_DUR = 3.0;

        // ── Ken Burns zoom on product image ──
        gsap.set('#product-frame', { scale: 1.0 });
        tl.to('#product-frame', { scale: 1.08, duration: DUR, ease: 'none' }, 0);

        // ── 6 steps, each 3s: fade-in + slide, hold, fade-out ──
        for (var i = 1; i <= 6; i++) {
          var id = '#step-' + i;
          var t0 = (i - 1) * STEP_DUR;       // start time
          var tOut = t0 + STEP_DUR - 0.3;     // exit time

          // Enter: slide from right + fade in
          tl.fromTo(id,
            { opacity: 0, x: 80 },
            { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' },
            t0
          );
          // Step number bounces in slightly after
          tl.fromTo(id + ' .step-num',
            { scale: 0.5 },
            { scale: 1, duration: 0.6, ease: 'back.out(1.4)' },
            t0 + 0.1
          );
          // Exit: fade out (skip last step, hold to end)
          if (i < 6) {
            tl.to(id, { opacity: 0, x: -40, duration: 0.3, ease: 'power2.in' }, tOut);
          }
        }

        // ── Progress bar ──
        tl.fromTo('#progress-fill',
          { width: '0%' },
          { width: '100%', duration: DUR, ease: 'none' },
          0
        );

        // ── Pad timeline to full duration ──
        tl.to({}, { duration: DUR }, 0);

        window.__timelines['instant-noodles'] = tl;
      })();
    </script>
  </div>
</body>
</html>
