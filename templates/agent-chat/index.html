<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Agent Chat Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=block" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; background: #1a1a2e; overflow: hidden; font-family: 'Inter', sans-serif; }
    #stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
  </style>
</head>
<body>
  <div id="stage"
       data-composition-id="agent-chat"
       data-start="0"
       data-width="1920"
       data-height="1080"
       data-duration="15">

    <!-- SLIDES_HERE -->
    <!-- End slides -->

    <audio id="music-bed" src="assets/music-bed.mp3"
      data-start="0" data-duration="15" data-volume="0.12"
      data-track-index="0" loop preload="auto"></audio>

    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        var DUR = 15.0;

        // SCENE_TRANSITIONS
        // End scene transitions

        tl.to({}, { duration: DUR }, 0);
        window.__timelines['agent-chat'] = tl;
      })();
    </script>
  </div>
</body>
</html>
