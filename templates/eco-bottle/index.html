<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Eco Bottle — Product Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=block" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 1920px; height: 1080px;
      background: #0f1614; overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
    }
    #eco {
      position: relative; width: 1920px; height: 1080px; overflow: hidden;
      background: radial-gradient(ellipse at 50% 40%, #1a2a22 0%, #0f1614 60%, #080c0a 100%);
    }

    .slide {
      position: absolute; inset: 0;
      display: none; opacity: 0;
      align-items: center; gap: 80px; padding: 0 120px;
      will-change: opacity, transform;
    }
    .slide-image {
      flex-shrink: 0; width: 640px; height: 640px;
      border-radius: 32px; overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(74,222,128,0.1);
    }
    .slide-image img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .slide-text { flex: 1; }
    .slide-title {
      font-size: 100px; font-weight: 900; color: #ffffff;
      letter-spacing: -0.03em; line-height: 1.05;
      text-shadow: 0 0 60px rgba(74, 222, 128, 0.15);
    }
    .slide-body {
      font-size: 44px; font-weight: 600; color: #4ade80;
      margin-top: 28px; letter-spacing: -0.01em;
    }
    .slide-accent {
      width: 100px; height: 5px; border-radius: 3px;
      background: linear-gradient(90deg, #4ade80, #34d399);
      margin-top: 40px;
    }

    .slide-num-badge {
      position: absolute; top: 60px; right: 80px;
      font-size: 28px; font-weight: 700; color: rgba(74, 222, 128, 0.3);
      font-variant-numeric: tabular-nums;
    }

    .caption-layer {
      position: absolute; bottom: 80px; left: 0; right: 0;
      text-align: center; pointer-events: none; z-index: 100;
    }
    .caption-phrase { display: none; opacity: 0; }
    .caption-phrase .word {
      display: inline-block;
      font-size: 48px; font-weight: 800;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.4);
      margin: 0 0.1em;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      transition: color 0.2s ease;
    }
    .caption-phrase .word--emphasis { color: #4ade80; }
    .caption-phrase .word--active { color: #ffea00; }

    .progress-track {
      position: absolute; bottom: 30px; left: 80px; right: 80px;
      height: 3px; background: rgba(255, 255, 255, 0.06);
      border-radius: 2px; overflow: hidden; z-index: 50;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #4ade80, #34d399);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="eco"
       data-composition-id="eco-bottle"
       data-start="0"
       data-width="1920"
       data-height="1080"
       data-duration="60">

    <div class="slide" id="slide-0">
      <div class="slide-num-badge">01</div>
      <div class="slide-image"><img src="{{ s1_image_src }}" alt="Product" /></div>
      <div class="slide-text">
        <div class="slide-title">{{ s1_title }}</div>
        <div class="slide-body">{{ s1_body }}</div>
        <div class="slide-accent"></div>
      </div>
    </div>

    <div class="slide" id="slide-1">
      <div class="slide-num-badge">02</div>
      <div class="slide-image"><img src="{{ s2_image_src }}" alt="Product" /></div>
      <div class="slide-text">
        <div class="slide-title">{{ s2_title }}</div>
        <div class="slide-body">{{ s2_body }}</div>
        <div class="slide-accent"></div>
      </div>
    </div>

    <div class="slide" id="slide-2">
      <div class="slide-num-badge">03</div>
      <div class="slide-image"><img src="{{ s3_image_src }}" alt="Product" /></div>
      <div class="slide-text">
        <div class="slide-title">{{ s3_title }}</div>
        <div class="slide-body">{{ s3_body }}</div>
        <div class="slide-accent"></div>
      </div>
    </div>

    <div class="slide" id="slide-3">
      <div class="slide-num-badge">04</div>
      <div class="slide-image"><img src="{{ s4_image_src }}" alt="Product" /></div>
      <div class="slide-text">
        <div class="slide-title">{{ s4_title }}</div>
        <div class="slide-body">{{ s4_body }}</div>
        <div class="slide-accent"></div>
      </div>
    </div>

    <div class="slide" id="slide-4">
      <div class="slide-num-badge">05</div>
      <div class="slide-image"><img src="{{ s5_image_src }}" alt="Product" /></div>
      <div class="slide-text">
        <div class="slide-title">{{ s5_title }}</div>
        <div class="slide-body">{{ s5_body }}</div>
        <div class="slide-accent"></div>
      </div>
    </div>

    <div class="slide" id="slide-5">
      <div class="slide-num-badge">06</div>
      <div class="slide-image"><img src="{{ s6_image_src }}" alt="Product" /></div>
      <div class="slide-text">
        <div class="slide-title">{{ s6_title }}</div>
        <div class="slide-body">{{ s6_body }}</div>
        <div class="slide-accent"></div>
      </div>
    </div>

    <div class="slide" id="slide-6">
      <div class="slide-num-badge">07</div>
      <div class="slide-image"><img src="{{ s7_image_src }}" alt="Product" /></div>
      <div class="slide-text">
        <div class="slide-title">{{ s7_title }}</div>
        <div class="slide-body">{{ s7_body }}</div>
        <div class="slide-accent"></div>
      </div>
    </div>

    <div class="slide" id="slide-7">
      <div class="slide-num-badge">08</div>
      <div class="slide-image"><img src="{{ s8_image_src }}" alt="Product" /></div>
      <div class="slide-text">
        <div class="slide-title">{{ s8_title }}</div>
        <div class="slide-body">{{ s8_body }}</div>
        <div class="slide-accent"></div>
      </div>
    </div>

    <!-- CAPTION_LAYER -->
    <!-- End caption layer -->

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <audio id="music-bed" src="assets/music-bed.mp3"
      data-start="0" data-duration="60" data-volume="0.2"
      data-track-index="0" loop preload="auto"></audio>
    <audio id="voiceover" src="assets/voiceover.mp3"
      data-start="0" data-duration="60" data-volume="1.0"
      data-track-index="1" preload="auto"></audio>

    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        var DUR = 60.0;

        // SCENE_TRANSITIONS
        // End scene transitions

        tl.fromTo('#progress-fill',
          { width: '0%' },
          { width: '100%', duration: DUR, ease: 'none' },
          0
        );

        // CAPTION_TIMELINE
        // End caption timeline

        tl.to({}, { duration: DUR }, 0);
        window.__timelines['eco-bottle'] = tl;
      })();
    </script>
  </div>
</body>
</html>
