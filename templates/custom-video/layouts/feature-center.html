<html data-composition-variables='[
  {"id":"title","type":"string","default":"Key Feature"},
  {"id":"body","type":"string","default":"Why it matters"}
]'>
<template>
  <div data-composition-id="__SLIDE_ID__" data-width="1920" data-height="1080"
       style="position:absolute;inset:0;background:#0a0a14;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
    <div style="max-width:1400px;padding:0 80px;">
      <h1 id="el-title" style="font-size:120px;font-weight:900;color:#fff;letter-spacing:-0.03em;margin:0;"></h1>
      <p id="el-body" style="font-size:52px;font-weight:600;color:#818cf8;margin-top:32px;"></p>
      <div style="width:100px;height:5px;border-radius:3px;background:linear-gradient(90deg,#818cf8,#c084fc);margin:40px auto 0;"></div>
    </div>
  </div>
  <script>
    const V = __hyperframes.getVariables();
    document.getElementById('el-title').textContent = V.title;
    document.getElementById('el-body').textContent = V.body;
    var tl = gsap.timeline({ paused: true });
    tl.from('#__SLIDE_ID__ > div > *', { opacity: 0, y: 40, duration: 0.4, stagger: 0.1 });
    window.__timelines['__SLIDE_ID__'] = tl;
  </script>
</template>
</html>
