<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>CLI Terminal Tutorial</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=block" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; background: #0d1117; overflow: hidden; font-family: 'Inter', sans-serif; }
    #stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }

    .header {
      position: absolute; top: 60px; left: 80px; right: 80px;
      display: flex; align-items: center; gap: 24px; z-index: 50;
    }
    .header img { width: 64px; height: 64px; border-radius: 14px; }
    .header-text h1 { font-size: 40px; font-weight: 800; color: #e6edf3; margin: 0; }
    .header-text p { font-size: 22px; color: #7d8590; margin: 4px 0 0; }

    .progress-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: #21262d; z-index: 9999;
    }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2dd4bf, #14b8a6); }
  </style>
</head>
<body>
  <div id="stage"
       data-composition-id="cli-tutorial"
       data-start="0"
       data-width="1920"
       data-height="1080"
       data-duration="15">

    <!-- SLIDES_HERE -->
    <!-- End slides -->

    <div class="header">
      <img src="assets/logo.svg" alt="Logo">
      <div class="header-text">
        <h1>MyDevTool</h1>
        <p>Ship faster with one command</p>
      </div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

    <audio id="music-bed" src="assets/music-bed.mp3"
      data-start="0" data-duration="15" data-volume="0.15"
      data-track-index="0" loop preload="auto"></audio>

    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        var DUR = 15.0;

        // SCENE_TRANSITIONS
        // End scene transitions

        tl.from('.header', { opacity: 0, y: -20, duration: 0.5, ease: 'power2.out' }, 0);

        tl.fromTo('#progress-fill',
          { width: '0%' },
          { width: '100%', duration: DUR, ease: 'none' },
          0
        );

        tl.to({}, { duration: DUR }, 0);
        window.__timelines['cli-tutorial'] = tl;
      })();
    </script>
  </div>
</body>
</html>
