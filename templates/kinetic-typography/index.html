<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Kinetic Typography</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=block" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; background: #080808; overflow: hidden; font-family: 'Inter', sans-serif; }
    #stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }

    .progress-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: rgba(255,255,255,0.05); z-index: 9999;
    }
    .progress-fill { height: 100%; width: 0%; background: #ff5a3c; }
  </style>
</head>
<body>
  <div id="stage"
       data-composition-id="kinetic-typography"
       data-start="0"
       data-width="1920"
       data-height="1080"
       data-duration="12">

    <!-- SLIDES_HERE -->
    <!-- End slides -->

    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

    <audio id="music-bed" src="assets/music-bed.mp3"
      data-start="0" data-duration="12" data-volume="0.15"
      data-track-index="0" loop preload="auto"></audio>

    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        var DUR = 12.0;

        // SCENE_TRANSITIONS
        // End scene transitions

        tl.fromTo('#progress-fill',
          { width: '0%' },
          { width: '100%', duration: DUR, ease: 'none' },
          0
        );

        tl.to({}, { duration: DUR }, 0);
        window.__timelines['kinetic-typography'] = tl;
      })();
    </script>
  </div>
</body>
</html>
